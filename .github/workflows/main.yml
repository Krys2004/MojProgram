name: Buduj EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Kompilacja
      run: |
        dir
        csc /out:MojProgram.exe *.cs
    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Program_Windows
        path: MojProgram.exe
