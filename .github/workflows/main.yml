name: Buduj Kosztorys OKIENKOWY

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pobieranie kodu
      uses: actions/checkout@v4

    - name: Konfiguracja MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Kompilacja GUI EXE
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
        csc /target:winexe /out:KosztorysOkienko.exe Program.cs

    - name: Udostepnij plik
      uses: actions/upload-artifact@v4
      with:
        name: Kosztorys_Gotowy
        path: KosztorysOkienko.exe
