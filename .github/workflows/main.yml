name: Buduj Kosztorys EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pobieranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja narzedzi MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Kompilacja programu okienkowego
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
        csc /target:winexe /out:Kosztorys.exe Program.cs

    - name: Udostepnij gotowy plik do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Program_Kosztorys
        path: Kosztorys.exe
