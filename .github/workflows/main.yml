name: Buduj EXE dla Windows

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Kompilacja do pliku EXE
      run: csc /out:MojProgram.exe Program.cs
    - name: Udostepnij plik do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Program_Windows
        path: MojProgram.exe
